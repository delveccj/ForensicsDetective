name: Assignment2 Analysis (Analysis2_Assignment2_raghulch)

on:
  workflow_dispatch: {}      # run manually from the Actions tab

permissions:
  contents: write            # allow committing results back

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Checkout (with LFS pointers)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true                   # try to get LFS on checkout

      - name: Ensure git-lfs and force fetch (handles LFS flakiness)
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo apt-get install -y git-lfs
          git lfs install
          # If checkout didn't pull the binaries, these calls fix it:
          git lfs fetch --all || true
          git lfs checkout || true
          # Quick sanity peek (won't fail the job)
          ls -lah Assignment2_raghulch/data/*_pdfs_png 2>/dev/null || true

      - name: System dependencies (poppler for pdftoppm)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y poppler-utils

      - name: Python setup + deps
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: |
          python -m pip install -U pip
          pip install numpy scipy scikit-learn matplotlib pillow pymupdf joblib statsmodels

      - name: Verify PNG datasets; rebuild from PDFs only if needed
        working-directory: Assignment2_raghulch
        shell: bash
        run: |
          set -euo pipefail
          echo "== Check PNG datasets under Assignment2_raghulch/data =="
          need_rebuild=0

          check_dir () {
            local d="data/$1"
            if [[ -d "$d" ]]; then
              shopt -s nullglob
              local arr=("$d"/*.png)
              local n="${#arr[@]}"
              echo "  - $d : $n pngs"
              [[ $n -eq 0 ]] && need_rebuild=1
            else
              echo "  - MISSING: $d"
              need_rebuild=1
            fi
          }

          check_dir word_pdfs_png
          check_dir google_docs_pdfs_png
          check_dir python_pdfs_png
          check_dir fourth_source_pdfs_png
          check_dir fifth_source_pdfs_png

          if [[ $need_rebuild -eq 1 ]]; then
            echo "::warning::PNGs incomplete or missing (likely LFS issue). Rebuilding from PDFs..."
            python src/image_conversion.py
          else
            echo "All PNG datasets present. Skipping image conversion."
          fi

      - name: Run Task 4 & 5 analysis (4-class + 5-class)
        working-directory: Assignment2_raghulch
        env:
          MIN_BYTES: "0"     # accept all non-empty PNGs
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p results/logs
          echo "=== 4-class analysis ==="
          python src/analysis.py | tee results/logs/task5_4class_actions.txt
          echo "=== 5-class analysis (include 5th source) ==="
          python src/analysis.py --include-fifth | tee results/logs/task5_5class_actions.txt

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: assignment2-results
          path: Assignment2_raghulch/results

      - name: Commit results back to repo
        working-directory: Assignment2_raghulch
        run: |
          git config user.name  "Raghul (CI)"
          git config user.email "raghuldav+ci@users.noreply.github.com"
          git add results || true
          git commit -m "CI: Task 4 & 5 results (robust pipeline)" || echo "nothing to commit"
          git push || true
