name: Assignment2 Analysis (robust PNG run)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Ensure git-lfs is set up and files fetched
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git-lfs
          git lfs install
          git lfs fetch --all || true
          git lfs checkout || true
          echo "== Folder listing =="
          ls -lah Assignment2_raghulch/data || true

      - name: Install dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: |
          python -m pip install -U pip
          pip install numpy scipy scikit-learn matplotlib pillow pymupdf joblib statsmodels

      - name: Check PNG folders; rebuild if missing
        working-directory: Assignment2_raghulch
        run: |
          set -eux
          rebuild=0
          for d in data/word_pdfs_png data/google_docs_pdfs_png data/python_pdfs_png data/fourth_source_pdfs_png data/fifth_source_pdfs_png; do
            echo "Checking $d..."
            if [ ! -d "$d" ] || [ -z "$(ls -A $d/*.png 2>/dev/null || true)" ]; then
              echo "::warning::Missing or empty $d"
              rebuild=1
            fi
          done
          if [ $rebuild -eq 1 ]; then
            echo "Rebuilding PNGs..."
            python src/image_conversion.py
          else
            echo "All PNG datasets present."
          fi

      - name: Run Task 4 and 5 analysis
        working-directory: Assignment2_raghulch
        run: |
          set -eux
          mkdir -p results/logs
          echo "=== Running 4-class analysis ==="
          python src/analysis.py | tee results/logs/task5_4class_actions.txt
          echo "=== Running 5-class analysis (with fifth source) ==="
          python src/analysis.py --include-fifth | tee results/logs/task5_5class_actions.txt

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: assignment2-results
          path: Assignment2_raghulch/results

      - name: Commit results back to repo
        working-directory: Assignment2_raghulch
        run: |
          git config user.name "Raghul (CI)"
          git config user.email "raghuldav+ci@users.noreply.github.com"
          git add results || true
          git commit -m "CI: updated Task 4+5 results" || echo "No changes"
          git push || true
