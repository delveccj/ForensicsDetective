name: Assignment2 Analysis (PNG-ready, include fifth)

on:
  workflow_dispatch: {}   # run manually

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      # 1) Checkout with LFS so PNGs are real files, not tiny pointers
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2) Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          pip install numpy scipy scikit-learn matplotlib pillow pymupdf joblib statsmodels

      # 3) Sanity check that PNGs exist (helpful log)
      - name: Verify PNG dataset presence
        working-directory: Assignment2_raghulch
        run: |
          echo "[ls] data folders:"
          ls -la data || true
          echo "[counts] *.png per class:"
          for d in data/*_png; do
            test -d "$d" || continue
            c=$(ls "$d"/*.png 2>/dev/null | wc -l)
            printf "  %-35s : %s\n" "$(basename "$d")" "$c"
          done
          # fail fast if nothing is present
          if ! ls data/*_png/*.png >/dev/null 2>&1; then
            echo "ERROR: No PNGs found under data/*_png. Ensure Git LFS has files committed."
            exit 1
          fi

      # 4) 4-class analysis
      - name: Run 4-class analysis
        working-directory: Assignment2_raghulch
        env:
          MIN_BYTES: "0"       # tolerant loader (keeps nearly all PNGs)
        run: |
          mkdir -p results/logs
          python src/analysis.py | tee results/logs/task5_4class_actions.txt

      # 5) 5-class analysis (include fifth class)
      - name: Run 5-class analysis (include fifth)
        working-directory: Assignment2_raghulch
        env:
          MIN_BYTES: "0"
        run: |
          mkdir -p results/logs
          python src/analysis.py --include-fifth | tee results/logs/task5_5class_actions.txt

      # 6) Save results as artifact
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: assignment2-results
          path: Assignment2_raghulch/results

      # 7) Commit results back to repo
      - name: Commit results back to repo
        working-directory: Assignment2_raghulch
        run: |
          git config user.name  "Raghul (CI)"
          git config user.email "raghuldav+ci@users.noreply.github.com"
          git add results || true
          git commit -m "CI: analysis results (PNG-ready + include fifth)" || echo "nothing to commit"
          git push || true
