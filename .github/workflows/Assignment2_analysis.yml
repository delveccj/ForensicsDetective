name: Assignment2 Analysis (PNG-ready including 5th source)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS manually (fallback)
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install
          git lfs pull || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install numpy scipy scikit-learn matplotlib pillow pymupdf joblib statsmodels

      - name: Show files
        run: |
          echo "Top level:"
          ls -R | head -n 100
          echo "Assignment2_raghulch contents:"
          ls -R Assignment2_raghulch | head -n 100

      - name: Run analysis (4 + 5 class)
        working-directory: Assignment2_raghulch
        run: |
          mkdir -p results/logs
          echo "=== Running 4-class ==="
          python src/analysis.py | tee results/logs/task5_4class_actions.txt || true
          echo "=== Running 5-class (include fifth) ==="
          python src/analysis.py --include-fifth | tee results/logs/task5_5class_actions.txt || true
          echo "=== DONE ==="

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: assignment2-results
          path: Assignment2_raghulch/results

      - name: Commit results back to repo
        working-directory: Assignment2_raghulch
        run: |
          git config user.name "Raghul (CI)"
          git config user.email "raghuldav+ci@users.noreply.github.com"
          git add results || true
          git commit -m "CI: analysis results (PNG-ready + include fifth)" || echo "nothing to commit"
          git push || true

      - name: Dump last 100 log lines if failed
        if: failure()
        run: |
          echo "=== LAST 100 LINES OF WORKDIR ==="
          ls -R Assignment2_raghulch/results | tail -n 100 || true
          tail -n 100 Assignment2_raghulch/results/logs/*.txt || true
