name: Assignment2 Analysis (PNG-only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Checkout (auth + LFS)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          token: ${{ secrets.LFS_TOKEN }}   # LFS binaries download

      - name: Ensure git-lfs and fetch PNGs (with retries)
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo apt-get install -y git-lfs
          git lfs install

          # retry LFS fetch a few times
          n=0
          until [ $n -ge 5 ]
          do
            git lfs fetch --all && git lfs checkout && break
            n=$((n+1))
            echo "LFS fetch retry $n/5..."
            sleep 10
          done

          echo "== Sanity listing =="
          ls -lah Assignment2_raghulch/data || true
          ls -lah Assignment2_raghulch/data/*_pdfs_png 2>/dev/null || true

      - name: Verify PNG datasets exist (fail if missing/empty)
        working-directory: Assignment2_raghulch
        shell: bash
        run: |
          set -euo pipefail
          ok=1
          for d in word_pdfs_png google_docs_pdfs_png python_pdfs_png fourth_source_pdfs_png fifth_source_pdfs_png; do
            if [[ ! -s data/$d/*.png ]]; then
              echo "::error::$d missing or empty. LFS may not have fetched PNGs."
              ok=0
            fi
          done
          [[ $ok -eq 1 ]] || (echo "::error::PNG datasets missing"; exit 1)
          echo " All PNG datasets are present. Proceeding to analysis."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install numpy scipy scikit-learn matplotlib pillow joblib statsmodels

      - name: Run Task 4 & 5 Analysis (PNG only)
        working-directory: Assignment2_raghulch
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p results/logs
          echo "=== 4-class analysis ==="
          python src/analysis.py | tee results/logs/task5_4class_actions.txt
          echo "=== 5-class analysis ==="
          python src/analysis.py --include-fifth | tee results/logs/task5_5class_actions.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: assignment2-results
          path: Assignment2_raghulch/results
