name: Assignment2 Analysis (PNG-only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Checkout (auth + LFS)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          token: ${{ secrets.LFS_TOKEN }}   # REQUIRED so LFS binaries download

      - name: Ensure git-lfs and fetch PNGs (with retries)
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo apt-get install -y git-lfs
          git lfs install

          # retry LFS a few times (network/LFS flakiness)
          n=0
          until [ $n -ge 5 ]
          do
            git lfs fetch --all && git lfs checkout && break
            n=$((n+1))
            echo "LFS fetch retry $n/5..."
            sleep 10
          done

          echo "== Sanity listing =="
          ls -lah Assignment2_raghulch/data || true
          ls -lah Assignment2_raghulch/data/*_pdfs_png 2>/dev/null || true

      - name: Verify PNG datasets exist (fail if missing/empty)
        working-directory: Assignment2_raghulch
        shell: bash
        run: |
          set -euo pipefail
          echo "== Verifying PNGs under Assignment2_raghulch/data =="
          ok=1
          check () {
            local d="data/$1"
            if [[ -d "$d" ]]; then
              shopt -s nullglob
              local arr=("$d"/*.png)
              local n="${#arr[@]}"
              echo "  - $d : $n pngs"
              if [[ $n -eq 0 ]]; then
                echo "::error::$d is present but empty. LFS may not have downloaded the binaries."
                ok=0
              fi
            else
              echo "::error::Missing directory: $d"
              ok=0
            fi
          }

          check word_pdfs_png
          check google_docs_pdfs_png
          check python_pdfs_png
          check fourth_source_pdfs_png
          check fifth_source_pdfs_png

          if [[ $ok -ne 1 ]]; then
            echo "::error::PNG datasets are not available. Fix Git LFS (quota/auth) and rerun."
            exit 1
          fi
          echo "All PNG datasets are present. Proceeding to analysis."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Python deps
        run: |
          python -m pip install -U pip
          pip install numpy scipy scikit-learn matplotlib pillow joblib statsmodels

      - name: Run Task 4 & 5 analysis (4-class + 5-class) — PNG only
        working-directory: Assignment2_raghulch
        env:
          MIN_BYTES: "0"   # accept all non-empty PNGs
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p results/logs
          echo "=== 4-class analysis ==="
          python src/analysis.py | tee results/logs/task5_4class_actions.txt
          echo "=== 5-class analysis (include 5th source) ==="
          python src/analysis.py --include-fifth | tee results/logs/task5_5class_actions.txt

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: assignment2-results
          path: Assignment2_raghulch/results

      - name: Commit results back to repo
        working-directory: Assignment2_raghulch
        run: |
          git config user.name  "Raghul (CI)"
          git config user.email "raghuldav+ci@users.noreply.github.com"
          git add results || true
          git commit -m "CI: Task 4 & 5 results (PNG-only run)" || echo "No changes"
          git push || true
