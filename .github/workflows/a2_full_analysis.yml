name: Assignment2 Analysis (PNG-ready)

on:
  workflow_dispatch:
    inputs:
      include_fifth:
        description: "Also run 5-class (--include-fifth)?"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          pip install numpy scipy scikit-learn matplotlib pillow pymupdf joblib statsmodels

      

      - name: 4-class analysis
        working-directory: Assignment2_raghulch
        env:
          MIN_BYTES: "0"        # tolerant image loader
        run: |
          mkdir -p results/logs
          python src/analysis.py | tee results/logs/task5_4class_actions.txt

      - name: 5-class analysis (optional)
        if: ${{ github.event.inputs.include_fifth == 'true' }}
        working-directory: Assignment2_raghulch
        env:
          MIN_BYTES: "0"
        run: |
          mkdir -p results/logs
          python src/analysis.py --include-fifth | tee results/logs/task5_5class_actions.txt

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: assignment2-results
          path: Assignment2_raghulch/results

      - name: Commit results back to repo
        working-directory: Assignment2_raghulch
        run: |
          git config user.name  "Raghul (CI)"
          git config user.email "raghuldav+ci@users.noreply.github.com"
          git add results || true
          git commit -m "CI: analysis results (PNG-ready workflow)" || echo "nothing to commit"
          git push || true
