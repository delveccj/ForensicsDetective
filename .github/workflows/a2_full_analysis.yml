name: Assignment2 Full Analysis

on:
  workflow_dispatch: {}
permissions:
  contents: write         # allow committing results back

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: System deps (poppler for pdftoppm)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y poppler-utils

      - name: Python deps
        run: |
          python -m pip install -U pip
          pip install numpy scipy scikit-learn matplotlib pillow pymupdf joblib statsmodels

      - name: Convert PDFs -> PNGs (idempotent)
        working-directory: Assignment2_raghulch
        run: |
          python src/image_conversion.py

      - name: Task 4+5 — FULL 4-class analysis
        working-directory: Assignment2_raghulch
        env:
          MIN_BYTES: "0"
        run: |
          mkdir -p results/logs
          python src/analysis.py | tee results/logs/task5_4class_actions.txt

      - name: (Optional) 5-class analysis (skip failure)
        working-directory: Assignment2_raghulch
        continue-on-error: true
        env:
          MIN_BYTES: "0"
        run: |
          mkdir -p results/logs
          python src/analysis.py --include-fifth | tee results/logs/task5_5class_actions.txt

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: assignment2-results
          path: Assignment2_raghulch/results

      - name: Commit results back to repo (CSV/JSON/PKL/PNGs under results)
        working-directory: Assignment2_raghulch
        run: |
          git config user.name  "Raghul (CI)"
          git config user.email "raghuldav+ci@users.noreply.github.com"
          git add results || true
          git commit -m "CI: add Task 4+5 results (auto)" || echo "nothing to commit"
          git push || true
